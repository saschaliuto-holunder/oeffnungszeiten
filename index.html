<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Öffnungszeiten – Liutografie</title>
<style>
:root{
  --bg0:#070a08;
  --bg1:#0f1411;
  --line:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.70);
  --ok:#2ee59d;
  --no:#ff4d6d;
  --pause:#ffd36a;
  --info:#7dcfff;
  --shadow:0 26px 70px rgba(0,0,0,.60);
  --radius:22px
}
*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(900px 650px at 20% 0%, rgba(46,229,157,.15), transparent 60%),
    radial-gradient(850px 650px at 85% 10%, rgba(255,77,109,.10), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg1));
  color:var(--text);
  display:grid;
  place-items:center;
  padding:16px;
  overflow:hidden
}

.wrap{width:min(1000px,100%)}

.shell{
  position:relative;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  max-height:calc(100svh - 32px);
  display:flex;
  flex-direction:column
}

header{
  padding:16px 20px 12px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start
}

.brand img{
  width:100%;
  max-width:520px;
  height:auto;
  max-height:120px;
  object-fit:contain;
  display:block;
  border-radius:16px;
  background:#fff
}

.mini{
  border:1px solid var(--line);
  padding:12px;
  border-radius:16px;
  min-width:240px;
  background:rgba(0,0,0,.25)
}

.clock{
  font-weight:850;
  font-size:18px
}

.date{
  font-size:12px;
  color:var(--muted);
  margin-top:4px
}

.holidayLine{
  margin-top:6px;
  font-size:12px;
  color:rgba(255,255,255,.78)
}

.holidayLine strong{color:var(--text)}

.content{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  border-top:1px solid var(--line);
  flex:1;
  min-height:0
}

@media(max-width:820px){
  .content{grid-template-columns:1fr}
}

.panel{
  padding:16px 20px;
  min-height:0
}

.panel+.panel{
  border-left:1px solid var(--line)
}

@media(max-width:820px){
  .panel+.panel{
    border-left:none;
    border-top:1px solid var(--line)
  }
}

.infoCard{
  margin-bottom:14px;
  padding:14px 16px;
  border:1px solid rgba(125,207,255,.28);
  border-radius:16px;
  background:rgba(125,207,255,.08)
}

.infoTitle{
  font-size:14px;
  font-weight:850;
  color:var(--info);
  margin-bottom:6px
}

.infoText{
  font-size:13px;
  line-height:1.55;
  color:var(--text)
}

.list{
  display:flex;
  flex-direction:column;
  gap:8px
}

.row{
  display:grid;
  grid-template-columns:190px 1fr;
  gap:12px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(0,0,0,.15)
}

.row.today{
  border:1px solid rgba(46,229,157,.5);
  background:rgba(46,229,157,.12)
}

.row .day{
  color:var(--muted);
  font-weight:720;
  font-size:13px
}

.row.today .day{
  color:var(--ok)
}

.row .hours{
  font-weight:720;
  font-variant-numeric:tabular-nums;
  font-size:13px;
  line-height:1.4
}

.row .hours.holiday{
  color:var(--pause)
}

.statusCard{
  border:1px solid var(--line);
  background:rgba(0,0,0,.25);
  border-radius:18px;
  padding:18px;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:0
}

.statusHead{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap
}

.bigStatus{
  font-size:clamp(36px,4vw,54px);
  font-weight:950;
  letter-spacing:-.03em;
  line-height:1.05
}

.bigStatus.open{color:var(--ok)}
.bigStatus.closed{color:var(--no)}
.bigStatus.pause{color:var(--pause)}

.liveDotBtn{
  width:18px;
  height:18px;
  border:none;
  border-radius:50%;
  flex:0 0 auto;
  cursor:pointer;
  padding:0;
  background:var(--no);
  box-shadow:0 0 0 0 rgba(255,77,109,.55);
  transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
  appearance:none;
  -webkit-appearance:none
}

.liveDotBtn:hover{
  transform:scale(1.12);
  filter:brightness(1.08)
}

.liveDotBtn:active{
  transform:scale(.95)
}

.liveDotBtn:focus-visible{
  outline:none;
  box-shadow:
    0 0 0 3px rgba(255,255,255,.16),
    0 0 0 6px rgba(46,229,157,.22)
}

.liveDotBtn.open{
  background:var(--ok);
  box-shadow:0 0 0 0 rgba(46,229,157,.55);
  animation:pulseOpen 1.8s infinite
}

.liveDotBtn.pause{
  background:var(--pause);
  box-shadow:0 0 0 0 rgba(255,211,106,.45)
}

.liveDotBtn.closed{
  background:var(--no);
  box-shadow:0 0 0 0 rgba(255,77,109,.45)
}

@keyframes pulseOpen{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(46,229,157,.55);
  }
  70%{
    transform:scale(1.08);
    box-shadow:0 0 0 12px rgba(46,229,157,0);
  }
  100%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(46,229,157,0);
  }
}

.countdown{
  margin-top:8px;
  font-size:15px;
  color:var(--muted);
  font-variant-numeric:tabular-nums
}

.countdown strong{color:var(--text)}

.detail{
  margin-top:10px;
  font-size:18px;
  font-weight:850;
  line-height:1.35
}

.nextHoliday{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--line);
  font-size:13px;
  color:var(--muted);
  line-height:1.55
}

.nextHoliday strong{color:var(--text)}

.nextHolidayList{
  margin-top:6px;
  display:flex;
  flex-direction:column;
  gap:6px
}

.nextHolidayItem{
  color:var(--muted)
}

.contact{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid var(--line);
  font-size:13px;
  color:var(--muted);
  line-height:1.7
}

.contact a{
  color:var(--text);
  text-decoration:none
}

.address{margin-top:6px}

@media (max-width: 720px){
  body{
    display:block;
    place-items:unset;
    overflow:auto;
    padding:12px
  }

  .shell{max-height:none}

  .content{
    display:flex;
    flex-direction:column
  }

  .content .panel:first-child{
    order:2;
  }

  .content .panel:last-child{
    order:1;
  }

  .panel{width:100%}
  .shell{border-radius:18px}

  header{padding:14px 14px 10px}

  .brand img{
    max-width:100%;
    height:auto
  }

  .mini{
    min-width:0;
    width:100%;
    margin-top:10px
  }

  .panel{padding:14px}

  .panel+.panel{
    border-left:none;
    border-top:1px solid var(--line)
  }

  .row{
    grid-template-columns:1fr;
    gap:6px
  }

  .day{font-size:12px}
  .hours{
    font-size:13px;
    line-height:1.35;
    word-break:break-word
  }

  .statusHead{
    gap:8px
  }

  .liveDotBtn{
    width:16px;
    height:16px
  }

  .bigStatus{
    font-size:clamp(34px,10vw,44px);
    line-height:1.05
  }

  .detail{
    font-size:16px;
    line-height:1.3;
    word-break:break-word
  }

  .countdown{font-size:14px}
  .contact{font-size:13px}
  .statusCard{height:auto}

  .infoCard{
    margin-bottom:12px
  }

  .infoText{
    font-size:13px
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="shell" id="appShell">
    <header>
      <div class="brand">
        <img src="liutografie-logo.jpg?v=2" alt="Liutografie Logo">
      </div>
      <div class="mini">
        <div class="clock" id="clock"></div>
        <div class="date" id="date"></div>
        <div class="holidayLine" id="holidayLine" style="display:none;"></div>
      </div>
    </header>

    <div class="content">
      <div class="panel">
        <div class="infoCard">
          <div class="infoTitle">Passbilder & Dokumentenfotos</div>
          <div class="infoText">
            Digitale Passbilder mit QR-Code sowie Passbilder für Führerschein und andere Dokumente erhalten Sie direkt bei uns.
          </div>
        </div>

        <div class="list" id="hoursList"></div>
      </div>

      <div class="panel">
        <div class="statusCard">
          <div>
            <div class="statusHead">
              <button class="liveDotBtn closed" id="liveDotBtn" aria-label="Vollbild umschalten" title="Vollbild"></button>
              <div class="bigStatus closed" id="bigStatus">GESCHLOSSEN</div>
            </div>
            <div class="countdown" id="countdown" style="display:none;"></div>
            <div class="detail" id="detail">—</div>
            <div class="nextHoliday" id="nextHoliday" style="display:none;"></div>
          </div>

          <div class="contact">
            <div><strong>Telefon:</strong> <a href="tel:05723917979">05723 / 917979</a></div>
            <div><strong>E-Mail:</strong> <a href="mailto:saschaliuto@gmail.com">saschaliuto@gmail.com</a></div>
            <div class="address"><strong>Adresse:</strong> Am Thermalbad 1, 31542 Bad Nenndorf</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const schedule = {
  0: [],
  1: [["09:00","13:00"],["15:00","18:30"]],
  2: [["09:00","13:00"],["15:00","18:30"]],
  3: [["09:00","12:00"]],
  4: [["09:00","13:00"],["15:00","18:30"]],
  5: [["09:00","13:00"],["15:00","18:30"]],
  6: [["09:00","12:00"]]
};

const dayOrder = [1,2,3,4,5,6,0];
const dayNames = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

function toMinutes(hhmm){
  const h = parseInt(hhmm.slice(0,2),10);
  const m = parseInt(hhmm.slice(3,5),10);
  return h * 60 + m;
}

function ymd(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function formatDateShort(date){
  return date.toLocaleDateString("de-DE", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  });
}

function formatCountdown(ms){
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function easterSunday(year){
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;

  const dt = new Date(year, month - 1, day);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  d.setHours(0,0,0,0);
  return d;
}

function holidaysNDS(year){
  const map = new Map();

  map.set(`${year}-01-01`, "Neujahr");
  map.set(`${year}-05-01`, "Tag der Arbeit");
  map.set(`${year}-10-03`, "Tag der Deutschen Einheit");
  map.set(`${year}-10-31`, "Reformationstag");
  map.set(`${year}-12-25`, "1. Weihnachtstag");
  map.set(`${year}-12-26`, "2. Weihnachtstag");

  const easter = easterSunday(year);
  map.set(ymd(addDays(easter, -2)), "Karfreitag");
  map.set(ymd(addDays(easter, 1)), "Ostermontag");
  map.set(ymd(addDays(easter, 39)), "Christi Himmelfahrt");
  map.set(ymd(addDays(easter, 50)), "Pfingstmontag");

  return map;
}

function holidayName(date){
  return holidaysNDS(date.getFullYear()).get(ymd(date)) || null;
}

function nextHolidaysFrom(now, count = 3){
  const result = [];
  const start = new Date(now);
  start.setHours(0,0,0,0);

  for(let i = 0; i <= 740 && result.length < count; i++){
    const d = addDays(start, i);
    const name = holidayName(d);

    if(!name) continue;
    if(i === 0 && holidayName(now)) continue;

    result.push({ date:d, name });
  }

  return result;
}

function statusNow(now){
  const hol = holidayName(now);
  if(hol){
    return { state:"closed", holiday:hol };
  }

  const day = now.getDay();
  const minutes = now.getHours() * 60 + now.getMinutes();
  const slots = schedule[day] || [];

  for(let idx = 0; idx < slots.length; idx++){
    const [start, end] = slots[idx];
    const s = toMinutes(start);
    const e = toMinutes(end);

    if(minutes >= s && minutes < e){
      const nextSlot = slots[idx + 1];
      if(nextSlot){
        return { state:"open", until:end, resumesAt:nextSlot[0] };
      }
      return { state:"open", until:end };
    }
  }

  if(slots.length >= 2){
    const firstEnd = toMinutes(slots[0][1]);
    const secondStart = toMinutes(slots[1][0]);

    if(minutes >= firstEnd && minutes < secondStart){
      return { state:"pause", resumesAt:slots[1][0] };
    }
  }

  return { state:"closed" };
}

function nextOpeningDate(now){
  for(let add = 0; add <= 14; add++){
    const d = new Date(now);
    d.setDate(now.getDate() + add);
    d.setHours(0,0,0,0);

    if(holidayName(d)) continue;

    const dow = d.getDay();
    const slots = schedule[dow] || [];
    if(!slots.length) continue;

    if(add === 0){
      const curMin = now.getHours() * 60 + now.getMinutes();

      for(const [start] of slots){
        if(toMinutes(start) > curMin){
          const n = new Date(now);
          n.setHours(
            parseInt(start.slice(0,2),10),
            parseInt(start.slice(3,5),10),
            0,
            0
          );
          return n;
        }
      }
    } else {
      const [start] = slots[0];
      const n = new Date(d);
      n.setHours(
        parseInt(start.slice(0,2),10),
        parseInt(start.slice(3,5),10),
        0,
        0
      );
      return n;
    }
  }

  return null;
}

function getNextDateForWeekday(baseDate, targetWeekday){
  const d = new Date(baseDate);
  d.setHours(0,0,0,0);

  let delta = targetWeekday - d.getDay();
  if(delta < 0) delta += 7;

  d.setDate(d.getDate() + delta);
  return d;
}

function renderWeek(){
  const now = new Date();
  const list = document.getElementById("hoursList");
  list.innerHTML = "";

  for(const weekday of dayOrder){
    const row = document.createElement("div");
    row.className = "row" + (weekday === now.getDay() ? " today" : "");

    const dayEl = document.createElement("div");
    dayEl.className = "day";
    dayEl.textContent = dayNames[weekday];

    const hoursEl = document.createElement("div");
    hoursEl.className = "hours";

    const targetDate = getNextDateForWeekday(now, weekday);
    const hol = holidayName(targetDate);

    if(hol){
      hoursEl.classList.add("holiday");
      hoursEl.textContent = `geschlossen (Feiertag: ${hol})`;
    } else {
      hoursEl.textContent = schedule[weekday].length
        ? schedule[weekday].map(slot => `${slot[0]}–${slot[1]}`).join(" · ")
        : "geschlossen";
    }

    row.appendChild(dayEl);
    row.appendChild(hoursEl);
    list.appendChild(row);
  }
}

function setLiveDot(state){
  const btn = document.getElementById("liveDotBtn");
  btn.className = `liveDotBtn ${state}`;
}

function renderUpcomingHolidays(now){
  const items = nextHolidaysFrom(now, 3);
  const el = document.getElementById("nextHoliday");

  if(!items.length){
    el.style.display = "none";
    el.textContent = "";
    return;
  }

  const rows = items.map(item => {
    const dayLabel = dayNames[item.date.getDay()];
    return `<div class="nextHolidayItem"><strong>${item.name}</strong> · ${dayLabel} · ${formatDateShort(item.date)}</div>`;
  }).join("");

  el.style.display = "block";
  el.innerHTML = `<strong>Nächste Feiertage:</strong><div class="nextHolidayList">${rows}</div>`;
}

function renderStatus(){
  const now = new Date();

  document.getElementById("clock").textContent = now.toLocaleTimeString("de-DE");
  document.getElementById("date").textContent = now.toLocaleDateString("de-DE", {
    weekday:"long",
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  });

  const todayHol = holidayName(now);
  const holidayLine = document.getElementById("holidayLine");

  if(todayHol){
    holidayLine.style.display = "block";
    holidayLine.innerHTML = `Feiertag: <strong>${todayHol}</strong>`;
  } else {
    holidayLine.style.display = "none";
    holidayLine.textContent = "";
  }

  renderUpcomingHolidays(now);

  const st = statusNow(now);
  const big = document.getElementById("bigStatus");
  const detail = document.getElementById("detail");
  const cd = document.getElementById("countdown");

  const prefix = todayHol ? `Heute: ${todayHol} · ` : "";

  if(st.state === "open"){
    setLiveDot("open");
    big.textContent = "GEÖFFNET";
    big.className = "bigStatus open";
    cd.style.display = "none";

    if(st.resumesAt){
      detail.textContent = `Heute bis ${st.until} Uhr · ab ${st.resumesAt} Uhr wieder geöffnet`;
    } else {
      detail.textContent = `Heute bis ${st.until} Uhr`;
    }
    return;
  }

  if(st.state === "pause"){
    setLiveDot("pause");
    big.textContent = "MITTAGSPAUSE";
    big.className = "bigStatus pause";

    const resumeMin = toMinutes(st.resumesAt);
    const resume = new Date(now);
    resume.setHours(Math.floor(resumeMin / 60), resumeMin % 60, 0, 0);

    cd.style.display = "block";
    cd.innerHTML = `Öffnet wieder in <strong>${formatCountdown(resume - now)}</strong>`;
    detail.textContent = `Heute ab ${st.resumesAt} Uhr wieder geöffnet`;
    return;
  }

  setLiveDot("closed");
  big.textContent = "GESCHLOSSEN";
  big.className = "bigStatus closed";

  const next = nextOpeningDate(now);

  if(next){
    const hh = String(next.getHours()).padStart(2,"0");
    const mm = String(next.getMinutes()).padStart(2,"0");

    cd.style.display = "block";
    cd.innerHTML = `Öffnet in <strong>${formatCountdown(next - now)}</strong>`;
    detail.textContent = `${prefix}Nächste Öffnung: ${dayNames[next.getDay()]} ${hh}:${mm} Uhr`;
  } else {
    cd.style.display = "none";
    detail.textContent = `${prefix}Derzeit geschlossen`;
  }
}

function renderAll(){
  renderWeek();
  renderStatus();
}

async function toggleFullscreen(){
  try{
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen();
    } else {
      await document.exitFullscreen();
    }
  } catch(err){
    console.error("Vollbild fehlgeschlagen:", err);
  }
}

document.getElementById("liveDotBtn").addEventListener("click", toggleFullscreen);

renderAll();
setInterval(renderStatus, 1000);
setInterval(renderWeek, 60000);
</script>
</body>
</html>
